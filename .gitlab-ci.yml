stages:
  - prepare
  - build
  - prod
  - clearRoute
  - fpmRestart

build_dev:
  variables:
    CI: "true"
  stage: build
  only:
    - /^release\/\d+$/
  tags:
    - ydzs-dev
  environment:
    name: development
    url: https://el1.talentyun.com
  when: manual
  script:
    - CurDir=`pwd`
    - dayStr=`date "+%y-%m-%d"`
    - DeployDir=/apps/www/pc
    - PHPComposer=/apps/www/composer.phar
    - php ${PHPComposer} config -g repo.packagist composer https://mirrors.aliyun.com/composer/
    - php ${PHPComposer} install
    - rsync -a --exclude public/ --exclude .git/ --exclude .env* --exclude data/ ./ ${DeployDir}/
    - rsync -a --delete ./apps/ ${DeployDir}/apps/
    - sudo rm -rf /tmp/ydzs/cache/routes/${dayStr}
    - sudo systemctl restart php-fpm

build_dev_wo_composer:
  variables:
    CI: "true"
  stage: build
  only:
    - /^release\/\d+$/
  tags:
    - ydzs-dev
  environment:
    name: development
    url: https://el1.talentyun.com
  when: manual
  script:
    - CurDir=`pwd`
    - dayStr=`date "+%y-%m-%d"`
    - DeployDir=/apps/www/pc
    - rsync -a --exclude public/ --exclude .git/ --exclude .env* --exclude data/ ./ ${DeployDir}/
    - rsync -a --delete ./apps/ ${DeployDir}/apps/
    - sudo rm -rf /tmp/ydzs/cache/routes/${dayStr}
    - sudo systemctl restart php-fpm

build_cn_pre:
  stage: prepare
  only:
    - master
  tags:
    - ydzs-prod-cn
  environment:
    name: production
    url: https://el.yidianzhishi.com
  when: manual
  script:
    - PHPComposer=/apps/www/composer.phar
    - >
        if [ ! -e "${PHPComposer}" ]; then
            sudo php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
            sudo php -r "if (hash_file('sha384', 'composer-setup.php') === '906a84df04cea2aa72f40b5f787e49f22d4c2f19492ac310e8cba5b96ac8b64115ac402c8cd292b8a03482574915d1a8') { echo 'Installer verified'; } else { echo 'Installer corrupt'; unlink('composer-setup.php'); } echo PHP_EOL;"
            sudo php composer-setup.php
            sudo php -r "unlink('composer-setup.php');"
            sudo mv composer.phar ${PHPComposer}
        fi


