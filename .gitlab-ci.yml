        fi
    - cd ${CurDir} && php ${PHPComposer} install
    - sudo mkdir -p ${DeployDir}
    - cd ${CurDir} && sudo rsync -a --exclude .git --exclude .gitlab-ci.yml ./ ${DeployDir}/ && sudo rm -rf sudo rm -rf /apps/www/opcache_file_cache/bd49345cfedb && sudo systemctl restart php-fpm

